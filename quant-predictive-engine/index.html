<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant Dev Analytics Hub</title>
    <style>
        :root { --bg-dark: #0b0f19; --card-bg: #131a2c; --accent-blue: #2563eb; --text-main: #f1f5f9; --text-muted: #64748b; --bullish: #10b981; --bearish: #ef4444; }
        body { font-family: 'SF Pro Display', -apple-system, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; }
        .header { margin-bottom: 30px; border-left: 4px solid var(--accent-blue); padding-left: 15px; }
        .header h1 { margin: 0; font-size: 1.8rem; letter-spacing: -0.025em; }
        .header p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: var(--card-bg); border: 1px solid #1e293b; border-radius: 12px; padding: 24px; }
        .card-title { color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 15px; }
        .metric-value { font-size: 2.2rem; font-weight: 700; margin-bottom: 5px; }
        .signal-badge { display: inline-block; padding: 6px 12px; border-radius: 6px; font-weight: 700; font-size: 0.85rem; }
        .BULLISH { background: rgba(16, 185, 129, 0.15); color: var(--bullish); }
        .BEARISH { background: rgba(239, 68, 68, 0.15); color: var(--bearish); }
        .performance-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e293b; }
        .performance-row:last-child { border: none; }
        .performance-label { color: var(--text-muted); }
        .performance-val { font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="engine-title">Quant Predictive Signal Core</h1>
        <p id="pipeline-meta">Initializing handshake with execution server...</p>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-title">Alpha Predictive Output</div>
            <div class="metric-value" id="spot-price">$0.00</div>
            <div style="margin-top: 15px;">
                <span id="signal-direction" class="signal-badge">COMPUTING</span>
                <span style="margin-left: 10px; color: var(--text-muted); font-size: 0.9rem;">Target: <strong id="target-price" style="color: var(--text-main);">-</strong></span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Out-of-Sample Risk Validation</div>
            <div class="performance-row">
                <span class="performance-label">Sharpe Ratio (Annualized)</span>
                <span class="performance-val" id="metric-sharpe">-</span>
            </div>
            <div class="performance-row">
                <span class="performance-label">Historical Hit Rate (Win %)</span>
                <span class="performance-val" id="metric-win">-</span>
            </div>
            <div class="performance-row">
                <span class="performance-label">Max Simulated Drawdown</span>
                <span class="performance-val" id="metric-drawdown" style="color: var(--bearish);">-</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Asynchronously download payload from static asset pipeline target
    fetch('./data/predictions.json')
        .then(res => {
            if(!res.ok) throw new Error("Payload configuration file unallocated.");
            return res.json();
        })
        .then(data => {
            document.getElementById('engine-title').innerText = `${data.meta.ticker} Quant Model Dashboard`;
            document.getElementById('pipeline-meta').innerText = `Model: ${data.meta.model_version} | Engine Sync Time: ${data.meta.execution_timestamp_utc} UTC`;
            
            document.getElementById('spot-price').innerText = `$${data.signal.current_spot_price.toFixed(2)}`;
            document.getElementById('target-price').innerText = `$${data.signal.predicted_target_price.toFixed(2)}`;
            
            const badge = document.getElementById('signal-direction');
            badge.innerText = data.signal.direction;
            badge.className = `signal-badge ${data.signal.direction}`;
            
            document.getElementById('metric-sharpe').innerText = data.backtest_performance.sharpe_ratio;
            document.getElementById('metric-win').innerText = `${data.backtest_performance.win_rate_pct}%`;
            document.getElementById('metric-drawdown').innerText = `${data.backtest_performance.max_drawdown_pct}%`;
        })
        .catch(err => {
            document.getElementById('engine-title').innerText = "Pipeline Initializing";
            document.getElementById('pipeline-meta').innerText = "Run the GitHub Actions workflow manually once to compile state records.";
            console.warn(err.message);
        });
</script>
</body>
</html>
