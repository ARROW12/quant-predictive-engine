<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Conviction Derivatives Terminal</title>
    <style>
        :root { --bg: #060814; --surface: #0e1326; --border: #1e293b; --text: #f8fafc; --muted: #64748b; --bull: #10b981; --bear: #f43f5e; --accent: #2563eb; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        h1 { margin: 0; font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em; }
        .time { color: var(--muted); font-size: 0.85rem; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
        .card.index-card { border: 2px solid #3b82f6; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .ticker { font-size: 1.4rem; font-weight: 800; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .BULLISH { background: rgba(16, 185, 129, 0.15); color: var(--bull); }
        .BEARISH { background: rgba(244, 63, 94, 0.15); color: var(--bear); }
        .contract-title { font-family: monospace; font-size: 1.1rem; color: #60a5fa; font-weight: 700; background: rgba(59, 130, 246, 0.1); padding: 4px 8px; border-radius: 6px; display: inline-block; margin-bottom: 10px; }
        .execution-box { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 15px; margin-top: 15px; border-left: 4px solid var(--accent); font-size: 0.85rem; }
        .metric-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.85rem; color: var(--muted); }
        .profit-pos { color: var(--bull); font-weight: 700; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>F&O Probability Matrix</h1>
            <div class="time" id="sync-time">Validating temporal trends...</div>
        </div>
        <div style="font-weight: 700; color: var(--bull); font-size: 0.9rem; background: rgba(16,185,129,0.1); padding: 8px 16px; border-radius: 8px;">
            Target: Net Profit ≥ ₹2,000
        </div>
    </header>
    <div class="grid" id="signal-grid"></div>
</div>

<script>
    fetch('./data/predictions.json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('sync-time').innerText = `Models Synchronized: ${data.meta.timestamp_ist}`;
            const grid = document.getElementById('signal-grid');
            
            data.signals.forEach(sig => {
                const isIndex = sig.ticker === "BANKNIFTY";
                const plan = sig.execution_plan;
                const isProfitable = plan.net_profit >= 2000;
                
                const card = document.createElement('div');
                card.className = `card ${isIndex ? 'index-card' : ''}`;
                card.innerHTML = `
                    <div class="card-header">
                        <span class="ticker">${sig.ticker}</span>
                        <span class="badge ${sig.direction}">${sig.direction} (${sig.confidence}%)</span>
                    </div>
                    <div class="contract-title">${sig.contract}</div>
                    
                    <div class="execution-box" style="border-left-color: ${isProfitable ? 'var(--bull)' : 'var(--bear)'};">
                        <div style="font-weight: 700; margin-bottom: 8px;">INDmoney Execution Plan</div>
                        <div class="metric-row"><span>Lots to Trade:</span> <span>${plan.required_lots}</span></div>
                        <div class="metric-row"><span>Capital Layout:</span> <span>₹${plan.capital_required}</span></div>
                        <div class="metric-row"><span>Estimated Fees:</span> <span>₹${plan.total_taxes_fees}</span></div>
                        <div class="metric-row"><span>Net Profit (Target 10%):</span> <span class="profit-pos">₹${plan.net_profit}</span></div>
                    </div>
                    
                    <div style="margin-top: 15px; font-size: 0.8rem; color: var(--muted);">
                        Entry: ₹${sig.option_entry} | Target: ₹${sig.option_target} | Stop: ₹${sig.option_stop}
                    </div>
                `;
                grid.appendChild(card);
            });
        })
        .catch(err => {
            document.getElementById('sync-time').innerHTML = `<span style="color: var(--bear);">Pipeline data unavailable.</span>`;
        });
</script>
</body>
</html>
